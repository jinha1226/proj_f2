name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.2

jobs:
  gut:
    name: GUT Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Import assets
        run: |
          godot --headless --path . --import --quit 2>&1 || true
          godot --headless --path . --import --quit 2>&1 || true

      - name: Run GUT tests
        run: |
          set -o pipefail
          godot --headless --path . -s res://addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json 2>&1 | tee gut_output.txt
          echo "--- verifying result ---"
          grep -q "All tests passed" gut_output.txt
          ! grep -qE "Failing Tests +[1-9]" gut_output.txt
